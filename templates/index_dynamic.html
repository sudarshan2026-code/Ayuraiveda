<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyurAI Veda - Time-Aware Ayurvedic Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            transition: all 1s ease;
            width: 100%;
        }

        /* Background Container */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: opacity 1s ease;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .bg-image.active {
            opacity: 1;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
            transition: background 1s ease;
        }

        /* Particle Animation Container */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .particles.active {
            opacity: 1;
        }

        /* Vata Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(244, 162, 97, 0.6);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(20px); }
            50% { transform: translateY(-60px) translateX(-20px); }
            75% { transform: translateY(-30px) translateX(20px); }
        }

        /* Pitta Glow */
        .glow-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(231, 111, 81, 0.3), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s infinite ease-in-out;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .glow-effect.active {
            opacity: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(1.5rem, 4vw, 2rem);
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: clamp(2rem, 5vw, 3rem);
            animation: fadeInDown 1s ease;
            width: 100%;
            max-width: 800px;
        }

        .logo {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.6);
            transition: color 1s ease;
            line-height: 1.2;
            word-wrap: break-word;
            color: #ffffff;
        }

        .subtitle {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            font-weight: 500;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            transition: color 1s ease;
            padding: 0 1rem;
            color: #ffffff;
            text-shadow: 0px 2px 6px rgba(0, 0, 0, 0.5);
        }

        /* Ayurvedic Status Card */
        .status-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: clamp(15px, 3vw, 20px);
            padding: clamp(1.5rem, 4vw, 2rem) clamp(2rem, 5vw, 3rem);
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 1s ease 0.3s both;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 600px;
        }

        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .current-cycle {
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 600;
            margin-bottom: 0.5rem;
            transition: color 1s ease;
            line-height: 1.4;
        }

        .cycle-time {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            opacity: 0.9;
            transition: color 1s ease;
            line-height: 1.5;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: clamp(0.75rem, 2vw, 1rem);
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease 0.6s both;
            width: 100%;
            max-width: 600px;
        }

        .btn {
            padding: clamp(0.85rem, 2.5vw, 1rem) clamp(1.75rem, 4vw, 2.5rem);
            border: none;
            border-radius: 50px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-height: 44px;
            white-space: nowrap;
            flex: 1 1 auto;
            min-width: min(200px, 100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: color 1s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            bottom: clamp(1rem, 3vw, 2rem);
            right: clamp(1rem, 3vw, 2rem);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: clamp(0.6rem, 2vw, 0.8rem) clamp(1rem, 3vw, 1.5rem);
            cursor: pointer;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 100;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .status-card {
                padding: 1.5rem 2rem;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
                min-width: 100%;
            }

            .theme-toggle {
                bottom: 1rem;
                right: 1rem;
                font-size: 0.8rem;
                padding: 0.6rem 1.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 1.25rem 1rem;
            }
            
            .header {
                margin-bottom: 1.5rem;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 0.85rem;
                padding: 0 0.5rem;
            }
            
            .status-card {
                padding: 1.25rem 1.5rem;
                margin-bottom: 1.5rem;
            }
            
            .current-cycle {
                font-size: 1rem;
            }
            
            .cycle-time {
                font-size: 0.8rem;
            }
            
            .btn {
                padding: 0.85rem 1.5rem;
                font-size: 0.9rem;
            }
            
            .theme-toggle {
                font-size: 0.7rem;
                padding: 0.5rem 1rem;
                bottom: 0.75rem;
                right: 0.75rem;
            }
        }
        
        @media (max-width: 360px) {
            .logo {
                font-size: 1.75rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
            
            .status-card {
                padding: 1rem 1.25rem;
            }
        }
        
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 1rem;
            }
            
            .header {
                margin-bottom: 1rem;
            }
            
            .status-card {
                padding: 1rem 1.5rem;
                margin-bottom: 1rem;
            }
            
            .theme-toggle {
                display: none;
            }
        }

        /* Theme-specific colors */
        body.vata {
            --primary: #F4A261;
            --accent: #E9C46A;
            --text: #ffffff;
        }

        body.pitta {
            --primary: #E76F51;
            --accent: #FFD166;
            --text: #ffffff;
        }

        body.kapha {
            --primary: #264653;
            --accent: #2A9D8F;
            --text: #ffffff;
        }

        body.vata .logo,
        body.vata .current-cycle,
        body.vata .cycle-time,
        body.vata .subtitle,
        body.vata .btn-secondary,
        body.vata .theme-toggle {
            color: #ffffff;
            text-shadow: 0px 2px 6px rgba(0, 0, 0, 0.5);
        }

        body.pitta .logo,
        body.pitta .current-cycle,
        body.pitta .cycle-time,
        body.pitta .subtitle,
        body.pitta .btn-secondary,
        body.pitta .theme-toggle {
            color: #ffffff;
            text-shadow: 0px 2px 6px rgba(0, 0, 0, 0.5);
        }

        body.kapha .logo,
        body.kapha .current-cycle,
        body.kapha .cycle-time,
        body.kapha .subtitle,
        body.kapha .btn-secondary,
        body.kapha .theme-toggle {
            color: #ffffff;
            text-shadow: 0px 2px 6px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- Background Images -->
    <div class="bg-container">
        <!-- Bright Ayurvedic Hero Images -->
        <div class="bg-image" id="bg-vata-1" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=1920&q=80');"></div>
        <div class="bg-image" id="bg-vata-2" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1505576399279-565b52d4ac71?w=1920&q=80');"></div>
        <div class="bg-image" id="bg-pitta-1" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=1920&q=80');"></div>
        <div class="bg-image" id="bg-pitta-2" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=1920&q=80');"></div>
        <div class="bg-image" id="bg-kapha-1" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=1920&q=80');"></div>
        <div class="bg-image" id="bg-kapha-2" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=1920&q=80');"></div>
    </div>

    <div class="bg-overlay"></div>

    <!-- Vata Particles -->
    <div class="particles" id="vata-particles"></div>

    <!-- Pitta Glow -->
    <div class="glow-effect" id="pitta-glow"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="header">
            <h1 class="logo">AyurAI Veda</h1>
            <p class="subtitle">An MSME Recognized by Government of India | Udyam Registered<br>Ancient Wisdom. Intelligent Health.</p>
        </div>

        <div class="status-card">
            <div class="current-cycle" id="cycle-name">Current Cycle: Loading...</div>
            <div class="cycle-time" id="cycle-time">Detecting your local time...</div>
        </div>

        <div class="actions">
            <a href="/clinical-assessment" class="btn btn-primary">Start Assessment</a>
            <a href="/chatbot" class="btn btn-secondary">Chat with AyurVaani</a>
        </div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle">Switch Theme Manually</button>

    <script>
        // Ayurvedic Phase Detection
        function getAyurvedaPhase(hour) {
            if (hour >= 4 && hour < 10) return "VATA";
            if (hour >= 10 && hour < 14) return "PITTA";
            if (hour >= 18 && hour < 22) return "KAPHA";
            return "KAPHA"; // Default fallback
        }

        // Get Phase Details
        function getPhaseDetails(phase) {
            const details = {
                VATA: {
                    name: "Vata Time",
                    description: "Morning Energy - Light, Mobile, Creative (4:00 AM - 10:00 AM)",
                    backgrounds: ['bg-vata-1', 'bg-vata-2'],
                    class: 'vata'
                },
                PITTA: {
                    name: "Pitta Time",
                    description: "Midday Power - Transformation, Digestion, Focus (10:00 AM - 2:00 PM)",
                    backgrounds: ['bg-pitta-1', 'bg-pitta-2'],
                    class: 'pitta'
                },
                KAPHA: {
                    name: "Kapha Time",
                    description: "Evening Calm - Stability, Rest, Grounding (6:00 PM - 10:00 PM)",
                    backgrounds: ['bg-kapha-1', 'bg-kapha-2'],
                    class: 'kapha'
                }
            };
            return details[phase];
        }

        // Create Vata Particles
        function createVataParticles() {
            const container = document.getElementById('vata-particles');
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (8 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        // Apply Theme
        function applyTheme(phase) {
            const details = getPhaseDetails(phase);
            const body = document.body;

            // Remove all theme classes
            body.classList.remove('vata', 'pitta', 'kapha');
            body.classList.add(details.class);

            // Update text
            document.getElementById('cycle-name').textContent = `Current Cycle: ${details.name}`;
            document.getElementById('cycle-time').textContent = details.description;

            // Hide all backgrounds
            document.querySelectorAll('.bg-image').forEach(bg => bg.classList.remove('active'));

            // Show random background for current phase
            const randomBg = details.backgrounds[Math.floor(Math.random() * details.backgrounds.length)];
            document.getElementById(randomBg).classList.add('active');

            // Handle animations
            document.getElementById('vata-particles').classList.remove('active');
            document.getElementById('pitta-glow').classList.remove('active');

            if (phase === 'VATA') {
                createVataParticles();
                document.getElementById('vata-particles').classList.add('active');
            } else if (phase === 'PITTA') {
                document.getElementById('pitta-glow').classList.add('active');
            }
        }

        // Initialize
        function init() {
            const now = new Date();
            const hour = now.getHours();
            const phase = getAyurvedaPhase(hour);
            applyTheme(phase);
        }

        // Manual Theme Toggle
        let manualPhases = ['VATA', 'PITTA', 'KAPHA'];
        let currentManualIndex = 0;

        document.getElementById('theme-toggle').addEventListener('click', () => {
            currentManualIndex = (currentManualIndex + 1) % manualPhases.length;
            applyTheme(manualPhases[currentManualIndex]);
        });

        // Auto-update every minute
        setInterval(() => {
            const now = new Date();
            const hour = now.getHours();
            const phase = getAyurvedaPhase(hour);
            applyTheme(phase);
        }, 60000);

        // Initialize on load
        init();
    </script>
</body>
</html>
