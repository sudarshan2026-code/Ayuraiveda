<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AyurAI Veda™</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container { max-width: 450px; margin: 3rem auto; padding: 0 20px; }
        .auth-box { background: white; padding: 2.5rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid var(--saffron); }
        .auth-box h2 { color: var(--navy); text-align: center; margin-bottom: 2rem; }
        .tab-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab-btn { flex: 1; padding: 0.75rem; border: 2px solid var(--border); background: white; cursor: pointer; border-radius: 5px; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
        .error-msg { background: #ffebee; color: #c62828; padding: 0.75rem; border-radius: 5px; margin-bottom: 1rem; display: none; }
        .success-msg { background: #e8f5e9; color: #2e7d32; padding: 0.75rem; border-radius: 5px; margin-bottom: 1rem; display: none; }
        #doctor-fields { display: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="top-bar-left">
                <span>🕉️ Indian Knowledge Systems</span>
                <span>|</span>
                <span>Ayurveda + AI</span>
            </div>
            <div class="top-bar-right">
            </div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <h2>📝 Create Account</h2>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('user')">👤 User</button>
                <button class="tab-btn" onclick="switchTab('doctor')">👨⚕️ Doctor</button>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="signupForm">
                <input type="hidden" id="user_type" name="user_type" value="user">
                
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone">
                </div>

                <div id="doctor-fields">
                    <div class="form-group">
                        <label>Specialization *</label>
                        <input type="text" id="specialization" placeholder="e.g., Ayurvedic Physician">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" required minlength="6">
                </div>

                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirm_password" required>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: #666;">
                Already have an account? <a href="/login" style="color: var(--saffron); font-weight: 600;">Login</a>
            </p>
            <p style="text-align: center; margin-top: 0.5rem;">
                <a href="/" style="color: var(--navy);">← Back to Home</a>
            </p>
        </div>
    </div>

    <script>
        function switchTab(type) {
            document.getElementById('user_type').value = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (type === 'doctor') {
                document.getElementById('doctor-fields').style.display = 'block';
                document.getElementById('specialization').required = true;
            } else {
                document.getElementById('doctor-fields').style.display = 'none';
                document.getElementById('specialization').required = false;
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                document.getElementById('error-msg').textContent = 'Passwords do not match';
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password,
                user_type: document.getElementById('user_type').value,
                specialization: document.getElementById('specialization').value
            };

            try {
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('success-msg').textContent = result.message + '. Redirecting to login...';
                    document.getElementById('success-msg').style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    document.getElementById('error-msg').textContent = result.message;
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('error-msg').textContent = 'Signup failed. Please try again.';
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
    <script src="{{ url_for('static', filename='js/security.js') }}"></script>
</body>
</html>
